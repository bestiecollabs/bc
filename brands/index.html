<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Brands</title><meta name="viewport" content="width=device-width, initial-scale=1">
<link href="/air.css" rel="stylesheet"><script defer src="/auth.js"></script>
<style>.wrap{max-width:1100px;margin:0 auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}.card{border:1px solid #e5e7eb;border-radius:12px;padding:12px;background:#fff}.logo{width:100%;height:120px;object-fit:contain;background:#f9fafb;border-radius:8px}.pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#eef2ff;display:inline-block;margin-right:6px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.controls{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.btn{padding:8px 12px;border:1px solid #c7d2fe;border-radius:10px;cursor:pointer;background:#4C6FFF;color:#fff}.input,select{padding:8px 10px;border:1px solid #e5e7eb;border-radius:10px;min-width:220px}.pager{display:flex;gap:8px;align-items:center;justify-content:center;margin:16px 0}</style>
</head><body>
<header class="wrap"><div class="row">
  <img src="/b1.png" alt="Bestie Collabs" style="height:36px"><h1 style="margin:0 0 0 6px">Brand Directory</h1>
</div>
<div class="controls">
  <input id="q" class="input" placeholder="Search brands or domains">
  <select id="cat"></select>
  <label><input type="checkbox" id="featured"> Featured</label>
  <button class="btn" id="apply">Apply</button>
</div></header>
<main class="wrap">
  <div id="count" style="margin:8px 0;color:#6b7280"></div>
  <div id="grid" class="grid"></div>
  <div class="pager"><button class="btn" id="prev">Prev</button><span id="page"></span><button class="btn" id="next">Next</button></div>
</main>
<script>
const s = new URL(location.href).searchParams;
let page = Math.max(1, parseInt(s.get("page")||"1",10));
const limit = 20;
async function loadCategories(){
  const r = await fetch("/api/categories"); const j = await r.json();
  const sel = document.getElementById("cat");
  sel.innerHTML = '<option value="">All categories</option>' + (j.categories||[]).map(c=>'<option>'+c+'</option>').join("");
}
async function load(){
  const q = document.getElementById("q").value.trim();
  const category = document.getElementById("cat").value.trim();
  const featured = document.getElementById("featured").checked ? "1" : "";
  const url = new URL(location.origin + "/api/brands");
  if(q) url.searchParams.set("q", q);
  if(category) url.searchParams.set("category", category);
  if(featured) url.searchParams.set("featured","1");
  url.searchParams.set("page", String(page));
  url.searchParams.set("limit", String(limit));
  const r = await fetch(url); const j = await r.json();
  document.getElementById("count").textContent = (j.total||0) + " brands";
  document.getElementById("page").textContent = "Page " + page;
  const grid = document.getElementById("grid");
  grid.innerHTML = (j.items||[]).map(b => `
    <a class="card" href="/brands/${encodeURIComponent(b.slug)}/">
      <img class="logo" src="${b.logo_url||""}" alt="">
      <h3 style="margin:8px 0 4px 0">${b.name}${b.featured? ' ⭐':''}</h3>
      <div class="row">
        ${[b.category_primary,b.category_secondary,b.category_tertiary].filter(Boolean).slice(0,3).map(c=>`<span class="pill">${c}</span>`).join("")}
      </div>
      <div style="color:#6b7280;margin-top:6px">${b.domain||""}</div>
    </a>`).join("");
}
document.getElementById("apply").onclick = ()=>{ page=1; load(); };
document.getElementById("prev").onclick = ()=>{ if(page>1){ page--; load(); } };
document.getElementById("next").onclick = ()=>{ page++; load(); };
window.addEventListener("DOMContentLoaded", async ()=>{ await loadCategories(); await load(); });
</script>
</body></html>
