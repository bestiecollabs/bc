<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Brand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/air.css" rel="stylesheet">
  <script defer src="/auth.js"></script>
  <style>
    .wrap{max-width:900px;margin:0 auto;padding:16px}
    .row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
    .logo{width:160px;height:160px;object-fit:contain;background:#f9fafb;border-radius:12px;border:1px solid #e5e7eb}
    .pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#eef2ff;display:inline-block;margin-right:6px}
    .a{color:#4C6FFF;text-decoration:underline}
    .box{border:1px solid #e5e7eb;border-radius:12px;padding:12px;background:#fff;margin-top:12px}
  </style>
</head>
<body>
<main class="wrap" id="app"></main>
<script>
async function load(){
  const slug = new URL(location.href).searchParams.get("slug")||"";
  if(!slug){ document.getElementById("app").innerHTML = "<p>Missing slug.</p>"; return; }
  const url = new URL(location.origin + "/api/brands");
  url.searchParams.set("q", slug);
  url.searchParams.set("limit","50");
  const r = await fetch(url); const j = await r.json();
  const b = (j.items||[]).find(x=>x.slug===slug);
  if(!b){ document.getElementById("app").innerHTML = "<p>Brand not found.</p>"; return; }
  const cats = [b.category_primary,b.category_secondary,b.category_tertiary].filter(Boolean).map(c=>`<span class='pill'>${c}</span>`).join("");
  const socials = [
    b.instagram_url ? `<a class='a' href='${b.instagram_url}' target='_blank' rel='noopener'>Instagram</a>` : "",
    b.tiktok_url ? `<a class='a' href='${b.tiktok_url}' target='_blank' rel='noopener'>TikTok</a>` : ""
  ].filter(Boolean).join(" · ");
  document.getElementById("app").innerHTML = `
    <a class="a" href="/brands/">← All brands</a>
    <div class="row" style="margin-top:8px">
      <img class="logo" src="${b.logo_url||""}" alt="">
      <div>
        <h1 style="margin:0 0 8px 0">${b.name}${b.featured?' ⭐':''}</h1>
        <div>${cats}</div>
        <div class="box">
          <div><strong>Website:</strong> <a class="a" href="${b.website_url}" target="_blank" rel="noopener">${b.domain||b.website_url}</a></div>
          ${socials? `<div style="margin-top:6px"><strong>Social:</strong> ${socials}</div>` : ""}
        </div>
        ${b.description ? `<div class="box" style="margin-top:12px"><strong>About</strong><div style="margin-top:6px;white-space:pre-wrap">${b.description}</div></div>` : ""}
      </div>
    </div>
  `;
}
window.addEventListener("DOMContentLoaded", load);
</script>
</body>
</html>
