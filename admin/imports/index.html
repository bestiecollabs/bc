<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin · Imports</title>
  <link rel="stylesheet" href="/air.css">
</head>
<body>
  <main class="section" style="max-width:900px;margin:0 auto">
    <h1>Brand Import</h1>
    <form id="f" enctype="multipart/form-data">
      <input type="file" name="file" accept=".csv" required>
      <label><input type="checkbox" id="dry" checked> Dry-run</label>
      <button type="submit">Upload</button>
    </form>
    <pre id="out" style="white-space:pre-wrap"></pre>
  </main>
  <script>
    const f = document.getElementById('f');
    const out = document.getElementById('out');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(f);
      const dry = document.getElementById('dry').checked ? '1' : '0';
      const res = await fetch(`/api/admin/import/brands?dry_run=${dry}`, {
        method: 'POST',
        headers: { 'x-admin-email': 'collabsbestie@gmail.com' },
        body: fd
      });
      const json = await res.json().catch(()=>({ok:false,error:'bad_json'}));
      out.textContent = JSON.stringify(json, null, 2);
    });
  </script>
</body>
</html>
