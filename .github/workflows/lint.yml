name: Lint
on:
  push: { branches: [ "main" ] }
  pull_request: {}
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: HTMLHint
        run: npx --yes htmlhint "html/**/*.html"
      - name: Stylelint
        run: npx --yes -p stylelint stylelint "html/**/*.css"
      - name: ESLint
        run: npx --yes -p eslint eslint "html/**/*.js" --max-warnings=0
