<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bestie Collabs — Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="/air.css" rel="stylesheet" />
</head>
<body class="air">
  <!-- Global Header loads from auth.js -->
  <header id="site-header" class="site-header">
    <a href="/" class="brand"><img src="b1.png" alt="Bestie Collabs" height="28" /></a>
    <nav class="nav">
      <a href="/dashboard/">Dashboard</a>
      <a href="/admin/brands/">Brands</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="page-title">Admin Dashboard</h1>

    <!-- KPI cards -->
    <section id="kpis" class="grid grid-5 gap">
      <div class="card">
        <div class="card-title">Users</div>
        <div id="kpi-users" class="kpi-value">—</div>
      </div>
      <div class="card">
        <div class="card-title">Brands in Directory</div>
        <div id="kpi-brands" class="kpi-value">—</div>
      </div>
      <div class="card">
        <div class="card-title">Creators in Directory</div>
        <div id="kpi-creators" class="kpi-value">—</div>
      </div>
      <div class="card">
        <div class="card-title">Recycle Bin</div>
        <div id="kpi-recycle" class="kpi-value">—</div>
      </div>
      <div class="card">
        <div class="card-title">DB Migrations</div>
        <div id="kpi-migrations" class="kpi-value">—</div>
      </div>
    </section>

    <!-- Recent activity placeholder -->
    <section class="mt-4">
      <h2>Recent Activity</h2>
      <ul id="recent-activity" class="list"></ul>
    </section>
  </main>

  <script src="/auth.js"></script>
  <script>
    // Session guard: require logged-in admin if auth.js exposes guards.
    (async function init() {
      try {
        if (window.ensureSession) await window.ensureSession();
        if (window.requireAdmin) await window.requireAdmin();
      } catch (e) {
        console.error("Auth guard error", e);
      }
      await loadKPIs();
      await loadRecent();
    })();

    async function loadKPIs() {
      setKpi('users', '…'); setKpi('brands', '…'); setKpi('creators', '…'); setKpi('recycle', '…'); setKpi('migrations', '…');

      const res = await fetch('/api/db-stats', { credentials: 'include' });
      if (!res.ok) { console.error('db-stats failed', res.status); return; }
      const data = await res.json();
      setKpi('users', safeNum(data.users));
      setKpi('brands', safeNum(data.brands_directory));
      setKpi('creators', safeNum(data.creators_directory));
      setKpi('recycle', safeNum(data.recycle_bin));
      setKpi('migrations', data.migrations_version ?? 'n/a');
    }

    function setKpi(key, val) { const el = document.getElementById(`kpi-${key}`); if (el) el.textContent = val; }
    function safeNum(n) { return Number.isFinite(n) ? n.toLocaleString() : '0'; }

    async function loadRecent() {
      const list = document.getElementById('recent-activity'); if (!list) return;
      list.innerHTML = `<li>DB stats loaded at ${new Date().toLocaleString()}</li>`;
    }
  </script>
</body>
</html>
