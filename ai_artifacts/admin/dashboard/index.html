<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard · Bestie Collabs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/air.css" rel="stylesheet">
</head>
<body>
<header class="section" style="padding-bottom:0">
  <h1>Admin Dashboard</h1>
  <div id="adminInfo" class="muted">Checking access…</div>
  <nav class="tabs">
    <button data-tab="brands" class="active">Brands</button>
    <button data-tab="creators">Creators</button>
    <button data-tab="recycle">Recycle Bin</button>
    <button data-tab="admins">Admins</button>
    <button data-tab="audit">Audit</button>
  </nav>
  <hr>
</header>

<main class="section" id="views">
  <!-- Brands -->
  <section data-view="brands" class="view active">
    <div class="row">
      <input id="brandsQ" placeholder="Search brands" class="input">
      <button id="brandsSearch" class="btn">Search</button>
      <button id="brandsExport" class="btn">Export CSV</button>
    </div>
    <table id="brandsTable" class="table"></table>
    <div class="row">
      <button id="brandsPrev" class="btn">Prev</button>
      <span id="brandsPage" class="muted"></span>
      <button id="brandsNext" class="btn">Next</button>
    </div>
  </section>

  <!-- Creators -->
  <section data-view="creators" class="view">
    <div class="row">
      <input id="creatorsQ" placeholder="Search creators" class="input">
      <button id="creatorsSearch" class="btn">Search</button>
      <button id="creatorsExport" class="btn">Export CSV</button>
    </div>
    <table id="creatorsTable" class="table"></table>
    <div class="row">
      <button id="creatorsPrev" class="btn">Prev</button>
      <span id="creatorsPage" class="muted"></span>
      <button id="creatorsNext" class="btn">Next</button>
    </div>
  </section>

  <!-- Recycle Bin -->
  <section data-view="recycle" class="view">
    <div class="row">
      <select id="recycleEntity" class="input">
        <option value="">All entities</option>
        <option value="directory_brands">directory_brands</option>
        <option value="directory_creators">directory_creators</option>
      </select>
      <button id="recycleRefresh" class="btn">Refresh</button>
    </div>
    <table id="recycleTable" class="table"></table>
    <div class="row">
      <input id="undoBatchId" class="input" placeholder="batch_id to undo">
      <button id="undoBatchBtn" class="btn">Undo batch</button>
    </div>
  </section>

  <!-- Admins -->
  <section data-view="admins" class="view">
    <table id="adminsTable" class="table"></table>
  </section>

  <!-- Audit -->
  <section data-view="audit" class="view">
    <table id="auditTable" class="table"></table>
  </section>
</main>

<script src="/admin/dashboard/admin.js" defer></script>
</body>
</html>
