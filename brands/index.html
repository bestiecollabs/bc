<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brands · Bestie Collabs</title>
  <link rel="icon" href="/favicon.png" />
  <meta name="theme-color" content="#5E7BFF" />
  <link rel="stylesheet" href="/air.css" />
</head>
<body>
<header class="site-header" style="border-bottom:1px solid #e5e7eb;background:#fff">
  <div class="wrap row" style="grid-template-columns:auto 1fr auto;align-items:center">
    <a class="brandmark" href="/"><img src="/b1.png" alt="Bestie Collabs" style="height:40px"><span class="title">Bestie Collabs</span></a>
    <nav style="justify-self:center;display:flex;gap:12px">
      <a href="/about/">About</a><a href="/brands/">Brands</a><a href="/creators/">Creators</a><a href="/pricing/">Pricing</a><a href="/support/">Support</a>
    </nav>
    <nav class="auth" style="display:flex;gap:12px">
      <a data-link="dashboard" href="/account/" style="display:none">Dashboard</a>
      <a data-link="login" href="/login/">Log in</a>
      <a data-link="create" href="/signup/">Create account</a>
      <a data-link="logout" href="/logout" style="display:none">Log out</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero container">
    <h1>Brands</h1>
    <p class="hero p">Browse verified US-based brands.</p>
  </section>

  <section class="container section">
    <div id="grid" class="grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px"></div>
    <p id="empty" class="note" style="display:none">No brands yet.</p>
  </section>
</main>

<footer class="wrap" style="border-top:1px solid #e5e7eb;padding-top:16px">
  <a href="/about/">About</a> · <a href="/brands/">Brands</a> · <a href="/cookie/">Cookie</a> · <a href="/creators/">Creators</a> · <a href="/pricing/">Pricing</a> · <a href="/privacy/">Privacy</a> · <a href="/support/">Support</a> · <a href="/terms/">Terms</a>
</footer>

<script src="/auth.js"></script>
<script>
(async function(){
  try{
    const res = await fetch('/api/brands?limit=50');
    const j = await res.json();
    const items = j?.items || j?.results || [];
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if(!items.length){ empty.style.display='block'; return; }
    for(const b of items){
      const card = document.createElement('a');
      card.className = 'card';
      card.href = `/brands/${encodeURIComponent(b.id)}/`;
      card.innerHTML = `
        <div style="display:flex;gap:12px;align-items:center">
          <img src="${b.logo_url||'/og.jpg'}" alt="" style="width:48px;height:48px;object-fit:cover;border-radius:8px">
          <div>
            <h3 class="funtext" style="margin:0">${escapeHtml(b.name||'Untitled')}</h3>
            <p style="margin:4px 0 0 0;font-size:14px;color:#555">${escapeHtml(b.category_primary||'')}</p>
          </div>
        </div>
        <p style="margin:12px 0 0 0;font-size:14px;color:#444">${escapeHtml((b.description||'').slice(0,140))}</p>
      `;
      grid.appendChild(card);
    }
  }catch(e){
    document.getElementById('empty').style.display='block';
  }
})();
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
</script>
</body>
</html>
